<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp page</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <span id="d1">

    </span>
   <div>
    <div id="demo"></div>
    <form action="submit">
        <table>
            <tr id="fL">
                <td  colspan="2" align="center" >REGISTER HERE</td>
            </tr>
            <tr>
                <td>First Name: </td>
                <td colspan="2 colspan="2""><input type="text" name="fName" placeholder="Enter your first name" value="fname" required></td>
            </tr>
            <tr>
                <td>Last Name: </td>
                <td colspan="2"><input type="text" name="sName" placeholder="Enter your last name" value="lname" required></td>
            </tr>
            <tr>
                <td>Mobile No: </td>
                <td colspan="2"><input type="number" name="PhNo" placeholder="Enter your phone no" value="ph_no" required>
                </td>
            </tr>
            <tr>
                <td>Email: </td>
                <td colspan="2"><input type="email" name="email" placeholder="Enter your email" value="email" required></td>
            </tr>
            <tr>
                <td>Date of birth:</td>
                <td colspan="2"><input type="date" name="DOB" placeholder="Chose your date of birth" value="DOB" required></td>
    
            </tr>
            <tr>
                <td>Gender:  </td>
                <td colspan="2"><input type="radio" name="gender" required>Male   <input type="radio" name="gender" required>Female   <input
                        type="radio" name="gender" value="gender" required>Others</td>
            </tr>
            <tr>
                <td rowspan="2" colspan="3" align="center"><button><b>Submit</b></button></td>
            </tr>
    
        </table>
    </form>
   </div>
</body>
</html>
